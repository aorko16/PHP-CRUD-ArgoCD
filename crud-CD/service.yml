apiVersion: v1
kind: Service
metadata:
  name: php-crud-service
  namespace: php-crud
  labels:
    app: php-crud
spec:
  type: LoadBalancer      # Use NodePort for Minikube: NodePort
  selector:
    app: php-crud
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      # nodePort: 30080   # Uncomment if using NodePort

---
# MySQL internal service (ClusterIP - not exposed outside)
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: php-crud
  labels:
    app: mysql
spec:
  type: ClusterIP
  selector:
    app: mysql
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
