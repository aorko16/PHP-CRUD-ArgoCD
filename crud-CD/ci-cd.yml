name: CI/CD → DockerHub + ArgoCD

on:
  push:
    branches: [ main ]
    paths:
      - 'crud-CI/**'      # Only trigger when app code changes

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: php-crud-app

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & Push Docker Image to DockerHub
  # ─────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push to DockerHub
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.short_sha }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🏷️ Generate image tag (short SHA)
        id: meta
        run: echo "short_sha=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: 🔐 Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./crud-CI
          file: ./crud-CI/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ Image push summary
        run: |
          echo "🐳 Image pushed:"
          echo "  → ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
          echo "  → ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.short_sha }}"

  # ─────────────────────────────────────────────
  # JOB 2: Update K8s Manifest → Trigger ArgoCD
  # ─────────────────────────────────────────────
  update-manifest:
    name: 📝 Update K8s Manifest (ArgoCD GitOps)
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}   # Personal Access Token with repo write access

      - name: 🔄 Update image tag in deployment.yml
        run: |
          NEW_TAG="${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}"
          echo "🔄 Updating image to: $NEW_TAG"

          # Replace the image line in deployment.yml
          sed -i "s|image: .*/php-crud-app:.*|image: $NEW_TAG|g" crud-CD/deployment.yml

          echo "✅ Updated deployment.yml:"
          grep "image:" crud-CD/deployment.yml

      - name: 📤 Commit & Push manifest update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add crud-CD/deployment.yml

          git commit -m "🚀 deploy: update image to ${{ needs.build-and-push.outputs.image_tag }} [skip ci]"
          git push

      - name: 🎉 ArgoCD will auto-sync
        run: |
          echo ""
          echo "✅ Manifest updated! ArgoCD will detect the change and sync automatically."
          echo "🔗 Check ArgoCD UI to watch the rollout."
