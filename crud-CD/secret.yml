# ⚠️ WARNING: Do NOT commit real passwords to Git!
# These are base64 encoded values. Generate with:
#   echo -n 'your-value' | base64
#
# Example values below (change before deploying!):
#   rootpassword   → cm9vdHBhc3N3b3Jk
#   cruduser       → Y3J1ZHVzZXI=
#   crudpassword   → Y3J1ZHBhc3N3b3Jk
#
# 🔐 For production: Use Sealed Secrets or External Secrets Operator

apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: php-crud
type: Opaque
data:
  mysql-root-password: cm9vdHBhc3N3b3Jk   # rootpassword
  mysql-user: Y3J1ZHVzZXI=                 # cruduser
  mysql-password: Y3J1ZHBhc3N3b3Jk         # crudpassword
