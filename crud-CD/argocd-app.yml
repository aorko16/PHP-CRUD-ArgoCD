apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: php-crud-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/aorko16/PHP-CRUD-ArgoCD.git
    targetRevision: main
    path: crud-CD

  destination:
    server: https://kubernetes.default.svc
    namespace: php-crud

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
