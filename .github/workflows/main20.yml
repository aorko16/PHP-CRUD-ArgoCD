name: CI → Build & Push-20

on:
  push:
    branches:
      - main
    paths:
      - crud-CI/**
  workflow_dispatch:

permissions:
  contents: write

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: php-crud-app

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & Push Docker Image
  # ─────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push to DockerHub
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.short_sha }}

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Generate image tag (short SHA)
        id: meta
        run: echo "short_sha=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: 🔨 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🚀 Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./crud-CI
          file: ./crud-CI/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.short_sha }}

      - name: 📋 Image push summary
        run: |
          echo "✅ Image pushed:"
          echo "  → ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
          echo "  → ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.short_sha }}"

  # ─────────────────────────────────────────────
  # JOB 2: Update docker-compose.yml
  # ─────────────────────────────────────────────
  update-compose:
    name: 📝 Update Docker Compose Image Tag
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: ✅ Checkout repo
        uses: actions/checkout@v4

      - name: 🔄 Update image tag in docker-compose.yml
        run: |
          sed -i "s|image: ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:.*|image: ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}|g" crud-CI/docker-compose.yml

      - name: 🔍 Show updated file
        run: cat crud-CI/docker-compose.yml

      - name: 📤 Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git fetch origin main
          git reset --hard origin/main
          git add crud-CI/docker-compose.yml
          git commit -m "chore: update image tag to ${{ needs.build-and-push.outputs.image_tag }} [skip ci]" || echo "No changes to commit"
          git push

  # ─────────────────────────────────────────────
  # JOB 3: Deploy to EC2 via SSH
  # ─────────────────────────────────────────────
  deploy-to-ec2:
    name: 🖥️ Deploy to EC2
    runs-on: ubuntu-latest
    needs: [build-and-push, update-compose]

    steps:
      - name: 🔑 SSH & Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app/PHP-CRUD-ArgoCD/crud-CI
            git pull origin main
            docker-compose pull
            docker-compose up -d
            docker image prune -f
            echo "✅ Deployed: ${{ needs.build-and-push.outputs.image_tag }}"
