name: CI/CD → DockerHub + ArgoCD

on:
  push:
    branches: [ main ]
    paths:
      - crud-CI/**          # your PHP app folder
      - php-crud-all-in-one.yaml  # single YAML file

permissions:
  contents: write

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: php-crud-app

jobs:

  # ───────────────
  # 1️⃣ Build & Push Docker Image
  # ───────────────
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.sha }}

    steps:
      # Checkout repo
      - uses: actions/checkout@v4

      # Generate short SHA tag
      - name: Generate tag
        id: meta
        run: echo "sha=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      # Docker login
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build and push image
      - uses: docker/build-push-action@v5
        with:
          context: ./crud-CI
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha }}

  # ───────────────
  # 2️⃣ Update YAML & Push
  # ───────────────
  update-yaml:
    runs-on: ubuntu-latest
    needs: build

    steps:
      # Checkout repo with push permissions
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Update Docker image tag in YAML
      - name: Update Docker image tag in YAML
        run: |
          NEW_TAG="${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.tag }}"
          sed -i "s|image: .*/php-crud-app:.*|image: $NEW_TAG|g" php-crud-all-in-one.yaml

      # Commit & push changes
      - name: Commit & push updated YAML
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add php-crud-all-in-one.yaml
          git commit -m "Update Docker image to ${{ needs.build.outputs.tag }}" || echo "No changes to commit"
          git pull --rebase origin main || echo "Nothing to pull"
          git push origin main
